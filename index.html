<!DOCTYPE html>
<html lang="es">
<head>
<!-- ============================================================
     GlobalSeguros — index.html
     Estructura HTML del proceso de compra
     Estilos  →  styles.css
     Lógica   →  app.js
     ============================================================ -->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GlobalSeguros – Proceso de Compra</title>

<!-- Tipografía corporativa -->
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet" />

<!-- Hoja de estilos -->
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ─── NAVEGACIÓN ──────────────────────────────────────────────────────── -->
<nav>
  <div class="logo"><span>Global</span>Seguros</div>
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">Planes</a></li>
    <li><a href="#">Beneficios</a></li>
    <li><a href="#">Contacto</a></li>
  </ul>
  <button class="nav-cta">Contact</button>
</nav>

<!-- ─── BARRA DE PROGRESO ────────────────────────────────────────────────── -->
<div class="progress-bar" id="progressBar">
  <div class="step-tab active" data-step="0"><div class="step-num">1</div> Catálogo</div>
  <div class="step-tab" data-step="1"><div class="step-num">2</div> Carrito</div>
  <div class="step-tab" data-step="2"><div class="step-num">3</div> Envío</div>
  <div class="step-tab" data-step="3"><div class="step-num">4</div> Pago</div>
  <div class="step-tab" data-step="4"><div class="step-num">5</div> Documentos</div>
  <div class="step-tab" data-step="5"><div class="step-num">6</div> Confirmación</div>
</div>

<!-- ─── CONTENIDO PRINCIPAL ─────────────────────────────────────────────── -->
<div class="main-wrapper">

  <!-- Panel dinámico: renderizado por app.js según el paso activo -->
  <div id="mainContent"></div>

  <!-- ─── BARRA LATERAL ─────────────────────────────────────────────────── -->
  <div class="sidebar">

    <!-- Resumen de pedido -->
    <div class="summary-panel">
      <div class="summary-header"><h3>Resumen de pedido</h3></div>
      <div class="summary-body" id="summaryBody">
        <p style="font-size:13px; color:var(--gray-text); text-align:center; padding: 14px 0;">Agrega productos para ver tu resumen</p>
      </div>
    </div>

    <!-- Badge de seguridad -->
    <div class="security-badge">
      🔒 Compra 100% segura · Datos cifrados SSL
    </div>

    <!-- Botón de acción contextual (cambia según el paso) -->
    <div class="summary-panel" id="sidebarActions" style="display:none">
      <div class="summary-body">
        <button class="btn-primary" id="sideActionBtn"></button>
      </div>
    </div>

  </div>
  <!-- /sidebar -->

</div>
<!-- /main-wrapper -->

<!-- Lógica de la aplicación -->
<script src="app.js"></script>

</body>
</html>
